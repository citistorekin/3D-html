        // --- 計算多邊形面積 (鞋帶定理 / Shoelace Formula) ---
        function calculateAreaFromPolygons(polygons) {
            if (!polygons || polygons.length === 0) {
                // 無多邊形數據，使用長寬相乘
                const areaMM2 = spaceWidth * spaceHeight;
                return Math.round(areaMM2 / (304.8 * 304.8)); // 轉換為平方呎
            }
            
            let totalAreaMM2 = 0;
            
            // 遍歷所有多邊形
            polygons.forEach(polygon => {
                if (!polygon || polygon.length < 3) return;
                
                // 應用鞋帶定理計算多邊形面積
                let area = 0;
                for (let i = 0; i < polygon.length; i++) {
                    const p1 = polygon[i];
                    const p2 = polygon[(i + 1) % polygon.length];
                    area += (p1.x * p2.y - p2.x * p1.y);
                }
                area = Math.abs(area) / 2;
                totalAreaMM2 += area;
            });
            
            // 轉換為平方呎 (1 平方呎 = 304.8 x 304.8 mm²)
            const areaSqFt = Math.round(totalAreaMM2 / (304.8 * 304.8));
            return areaSqFt;
        }

        function drawFloorplan() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(panX, panY); ctx.scale(zoom, zoom);

            const sW = spaceWidth / SCALE, sH = spaceHeight / SCALE;
            
            // 計算並顯示面積
            const areaSqFt = calculateAreaFromPolygons(floorPolygons);
            
            // 繪製 DXF 多邊形地面或默認矩形
            if (floorPolygons && floorPolygons.length > 0) {
                ctx.fillStyle = '#0f172a';
                floorPolygons.forEach(poly => {
                    if (poly.length > 0) {
                        ctx.beginPath();
                        ctx.moveTo(poly[0].x / SCALE, poly[0].y / SCALE);
                        for (let p = 1; p < poly.length; p++) {
                            ctx.lineTo(poly[p].x / SCALE, poly[p].y / SCALE);
                        }
                        ctx.closePath();
                        ctx.fill();
                    }
                });
            } else {
                ctx.fillStyle = '#0f172a'; 
                ctx.fillRect(0, 0, sW, sH);
            }

            // 繪製牆面軌跡線
            if (wallPolygons && wallPolygons.length > 0) {
                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 3;
                wallPolygons.forEach(wall => {
                    if (wall.length > 0) {
                        ctx.beginPath();
                        ctx.moveTo(wall[0].x / SCALE, wall[0].y / SCALE);
                        for (let p = 1; p < wall.length; p++) {
                            ctx.lineTo(wall[p].x / SCALE, wall[p].y / SCALE);
                        }
                        ctx.stroke();
                    }
                });
            }

            // 輔支網格線繪製
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1; const step = 1000 / SCALE;
            for (let i=0; i<sW; i+=step) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, sH); ctx.stroke(); }
            for (let j=0; j<sH; j+=step) { ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(sW, j); ctx.stroke(); }

            // 統一調用 2D 物件/結構柱繪製
            drawAll2DObjects(ctx, SCALE, false);

            drawDimensionLine(ctx, 0, 0, sW, 0, `${Math.round(spaceWidth)}mm`, -45, false, false);
            drawDimensionLine(ctx, sW, 0, sW, sH, `${Math.round(spaceHeight)}mm`, 45, true, false);
            ctx.restore();
            
            // 在網頁視窗左上方顯示面積（不包含在導出圖片中）
            ctx.save();
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`AREA : ${areaSqFt} SQ.FT`, 25, 25);
            ctx.restore();
        }

        // --- 7. Three.js ---
        function updateCameraPosition() {
            if (!camera) return;
            camera.position.x = cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta);
            camera.position.y = cameraRadius * Math.cos(cameraPhi);
            camera.position.z = cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta);
            camera.lookAt(0, 500, 0);
        }

        function init3DControls(container) {
            container.addEventListener('mousedown', (e) => {
                if (e.button === 2 || e.button === 0) { is3DActive = true; lastMousePos = getMousePos(e); }
            });
            container.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('mousemove', (e) => {
                if (!is3DActive) return;
                const m = getMousePos(e);
                cameraTheta -= (m.x - lastMousePos.x) * 0.007;
                cameraPhi = Math.max(0.1, Math.min(Math.PI/2 - 0.05, cameraPhi - (m.y - lastMousePos.y) * 0.007));
                updateCameraPosition(); lastMousePos = m;
            });
            window.addEventListener('mouseup', () => is3DActive = false);
            container.addEventListener('wheel', (e) => {
                e.preventDefault(); cameraRadius = Math.max(1000, Math.min(80000, cameraRadius + e.deltaY * 5)); updateCameraPosition();
            }, { passive: false });
        }

        // 豪華高擬真黑曜石大理石程序紋理生成器 (Fallback Engine)
        function createMarbleTexture(isGround = true) {
            const canvasTex = document.createElement('canvas'); 
            canvasTex.width = canvasTex.height = 1024;
            const ctxTex = canvasTex.getContext('2d');
            
            const grad = ctxTex.createRadialGradient(512, 512, 100, 512, 512, 700);
            if (isGround) {
                grad.addColorStop(0, '#1c1f26'); 
                grad.addColorStop(1, '#0b0d11');
            } else {
                grad.addColorStop(0, '#3f4857'); 
                grad.addColorStop(1, '#2b313d');
            }
            ctxTex.fillStyle = grad; 
            ctxTex.fillRect(0, 0, 1024, 1024);
            
            ctxTex.shadowColor = 'rgba(0, 0, 0, 0.6)'; 
            ctxTex.shadowBlur = 6; 
            
            ctxTex.strokeStyle = isGround ? 'rgba(255, 255, 255, 0.45)' : 'rgba(255, 255, 255, 0.28)'; 
            ctxTex.lineWidth = isGround ? 2.5 : 1.8;
            for (let i = 0; i < 18; i++) {
                ctxTex.beginPath(); 
                let sx = Math.random() * 1024, cy = 0, cx = sx; 
                ctxTex.moveTo(sx, 0);
                while (cy < 1024) { 
                    cx += (Math.random() - 0.4) * 140 + 60; 
                    cy += Math.random() * 120 + 40; 
                    ctxTex.lineTo(cx, cy); 
                } 
                ctxTex.stroke();
            }
            
            ctxTex.strokeStyle = 'rgba(230, 150, 40, 0.25)'; 
            ctxTex.lineWidth = 1.2;
            for (let i = 0; i < 10; i++) {
                ctxTex.beginPath(); 
                let sx = Math.random() * 1024, cy = 0, cx = sx; 
                ctxTex.moveTo(sx, 0);
                while (cy < 1024) { 
                    cx += (Math.random() - 0.5) * 120 + 30; 
                    cy += Math.random() * 100 + 60; 
                    ctxTex.lineTo(cx, cy); 
                } 
                ctxTex.stroke();
            }
            
            const texture = new THREE.CanvasTexture(canvasTex); 
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping; 
            return texture;
        }

        // ⭐ 確保在 1.9 環境光下也是優雅沉穩的黑灰色 ⭐
        function getGroundMaterial(width, height) {
            const fallbackTex = createMarbleTexture(true);
            fallbackTex.repeat.set(width / 2500, height / 2500); 
            
            const mat = new THREE.MeshStandardMaterial({ 
                roughness: 0.98, 
                metalness: 0.0,  
                map: fallbackTex,
                color: 0x0f0f0f  
            });
            
            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');
            texLoader.load(GROUND_TEXTURE_PATH, function(loadedTex) {
                loadedTex.wrapS = THREE.RepeatWrapping;
                loadedTex.wrapT = THREE.RepeatWrapping;
                loadedTex.repeat.set(width / 2500, height / 2500);
                loadedTex.needsUpdate = true;
                mat.map = loadedTex;
                mat.color.setHex(0x181818); 
                mat.needsUpdate = true;
            });
            return mat;
        }

        function getPillarMaterial(w, h) {
            const fallbackTex = createMarbleTexture(false);
            fallbackTex.repeat.set(w / 1000, 2800 / 1000);
            
            const mat = new THREE.MeshStandardMaterial({ 
                roughness: 0.95, 
                metalness: 0.0,  
                map: fallbackTex,
                color: 0x1e1e1e  
            });
            
            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');
            texLoader.load(PILLAR_TEXTURE_PATH, function(loadedTex) {
                loadedTex.wrapS = THREE.RepeatWrapping;
                loadedTex.wrapT = THREE.RepeatWrapping;
                loadedTex.repeat.set(w / 1000, 2800 / 1000);
                loadedTex.needsUpdate = true;
                mat.map = loadedTex;
                mat.color.setHex(0x282828); 
                mat.needsUpdate = true;
            });
            return mat;
        }

        function preloadTextures() {}

        function setupEnvironment() {
            if (floorMesh) scene.remove(floorMesh);

            let floorGeo;
            if (floorPolygons && floorPolygons.length > 0) {
                const floorShape = new THREE.Shape();
                const poly = floorPolygons[0];
                if (poly && poly.length > 0) {
                    floorShape.moveTo(poly[0].x - spaceWidth/2, spaceHeight/2 - poly[0].y);
                    for (let p = 1; p < poly.length; p++) {
                        floorShape.lineTo(poly[p].x - spaceWidth/2, spaceHeight/2 - poly[p].y);
                    }
                }
                floorGeo = new THREE.ShapeGeometry(floorShape);
            } else {
                floorGeo = new THREE.PlaneGeometry(spaceWidth, spaceHeight);
            }

            floorGeo.computeBoundingBox();
            const bbox = floorGeo.boundingBox;
            const size = new THREE.Vector3();
            bbox.getSize(size);
            const uvs = floorGeo.attributes.uv;
            if (uvs) {
                for (let i = 0; i < uvs.count; i++) {
                    const u = (floorGeo.attributes.position.getX(i) - bbox.min.x) / (size.x || 1);
                    const v = (floorGeo.attributes.position.getY(i) - bbox.min.y) / (size.y || 1);
                    uvs.setXY(i, u, v);
                }
                uvs.needsUpdate = true;
            }

            const floorMat = getGroundMaterial(spaceWidth, spaceHeight);

            floorMesh = new THREE.Mesh(floorGeo, floorMat);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.receiveShadow = true; 
            scene.add(floorMesh);

            if (wallGroup) scene.remove(wallGroup);
            wallGroup = new THREE.Group();
            const wallHeight = 2800; 
            
            if (wallPolygons && wallPolygons.length > 0) {
                wallPolygons.forEach(wall => {
                    for (let i = 0; i < wall.length - 1; i++) {
                        const p1 = wall[i], p2 = wall[i+1];
                        const dx = p2.x - p1.x, dy = p2.y - p1.y;
                        const distance = Math.hypot(dx, dy);
                        if (distance < 1) continue;
                        const angle = Math.atan2(dy, dx);
                        
                        const thickness = 100; 
                        const wallSegGeo = new THREE.BoxGeometry(distance, wallHeight, thickness);
                        
                        const wallSegMat = new THREE.MeshStandardMaterial({ 
                            color: 0x4a4a4a, 
                            roughness: 0.95, 
                            metalness: 0.0 
                        });
                        const wallMesh = new THREE.Mesh(wallSegGeo, wallSegMat);
                        
                        const midX = (p1.x + p2.x)/2 - spaceWidth/2;
                        const midY = (p1.y + p2.y)/2 - spaceHeight/2;
                        wallMesh.position.set(midX, wallHeight/2, midY);
                        wallMesh.rotation.y = -angle;
                        wallMesh.castShadow = true; wallMesh.receiveShadow = true;
                        wallGroup.add(wallMesh);
                    }
                });
                scene.add(wallGroup);
            }
        }

        function updateFloor3D() { setupEnvironment(); }

        function buildPillars3D() {
            if (pillarsGroup) scene.remove(pillarsGroup);
            pillarsGroup = new THREE.Group(); scene.add(pillarsGroup);
            
            const pillarHeight = 2800; 

            barriers.forEach(bar => {
                if (bar.type === 'pillar') {
                    let colMesh;
                    const colMat = getPillarMaterial(bar.w, bar.h);

                    if (bar.polygon && bar.polygon.length > 2) {
                        const colShape = new THREE.Shape();
                        colShape.moveTo(bar.polygon[0].x - spaceWidth/2, spaceHeight/2 - bar.polygon[0].y);
                        for (let p = 1; p < bar.polygon.length; p++) {
                            colShape.lineTo(bar.polygon[p].x - spaceWidth/2, spaceHeight/2 - bar.polygon[p].y);
                        }
                        const extrudeSettings = { depth: pillarHeight, bevelEnabled: false };
                        const colGeo = new THREE.ExtrudeGeometry(colShape, extrudeSettings);
                        colGeo.rotateX(-Math.PI / 2); 

                        colGeo.computeBoundingBox();
                        const pBbox = colGeo.boundingBox;
                        const pSize = new THREE.Vector3();
                        pBbox.getSize(pSize);
                        const pUvs = colGeo.attributes.uv;
                        if (pUvs) {
                            for (let i = 0; i < pUvs.count; i++) {
                                const u = (colGeo.attributes.position.getX(i) - pBbox.min.x) / (pSize.x || 1);
                                const v = (colGeo.attributes.position.getY(i) - pBbox.min.y) / (pSize.y || 1);
                                pUvs.setXY(i, u, v);
                            }
                            pUvs.needsUpdate = true;
                        }

                        colMesh = new THREE.Mesh(colGeo, colMat);
                    } else {
                        const wallGeo = new THREE.BoxGeometry(bar.w, pillarHeight, bar.h);
                        colMesh = new THREE.Mesh(wallGeo, colMat);
                        colMesh.position.set(bar.x - spaceWidth/2, pillarHeight/2, bar.y - spaceHeight/2);
                    }
                    colMesh.castShadow = colMesh.receiveShadow = true; 
                    pillarsGroup.add(colMesh);
                }
            });
        }

        function createObject3D(obj) {
            removeObject3D(obj.id);
            const group = new THREE.Group();
            
            if (obj.style === 'glb' && obj.glbPath) {
                const placeholderMat = new THREE.MeshStandardMaterial({ color: obj.color, wireframe: true });
                const placeholder = new THREE.Mesh(new THREE.BoxGeometry(obj.length, obj.height, obj.width), placeholderMat);
                placeholder.position.y = obj.height / 2;
                group.add(placeholder);

                const gltfLoader = new THREE.GLTFLoader();
                // 設定 DRACO 解碼器
                const dracoLoader = new THREE.DRACOLoader();
                dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
                gltfLoader.setDRACOLoader(dracoLoader);
                
                gltfLoader.load(obj.glbPath, function (gltf) {
                    const object = gltf.scene;
                    
                    // 純幾何頂點掃描：強制計算所有 Mesh 的幾何邊界，忽略節點座標
                    let geometryBox = new THREE.Box3();
                    let hasGeometry = false;
                    
                    object.traverse(function (child) {
                        if (child.isMesh && child.geometry) {
                            hasGeometry = true;
                            // 強制計算幾何邊界框（基於頂點數據，不受節點位置影響）
                            if (!child.geometry.boundingBox) {
                                child.geometry.computeBoundingBox();
                            }
                            const localBox = child.geometry.boundingBox.clone();
                            // 應用該 Mesh 的世界矩陣以轉換到世界坐標
                            localBox.applyMatrix4(child.matrixWorld);
                            geometryBox.union(localBox);
                        }
                    });
                    
                    // 如果沒有找到幾何體，使用整個場景的邊界框
                    if (!hasGeometry) {
                        object.updateMatrixWorld(true);
                        geometryBox = new THREE.Box3().setFromObject(object);
                    }
                    
                    const size = geometryBox.getSize(new THREE.Vector3());
                    
                    // 確保尺寸有效
                    if (size.x <= 0 || size.y <= 0 || size.z <= 0) {
                        console.warn("警告：模型尺寸異常，使用預設縮放");
                        object.scale.set(1, 1, obj.mirrored ? -1 : 1);
                    } else {
                        const scaleX = obj.length / size.x;
                        const scaleY = obj.height / size.y;
                        const scaleZ = (obj.width / size.z) * (obj.mirrored ? -1 : 1);
                        object.scale.set(scaleX, scaleY, scaleZ);
                    }
                    
                    // 再次更新矩陣以應用縮放
                    object.updateMatrixWorld(true);
                    
                    const scaledBox = new THREE.Box3().setFromObject(object);
                    const center = scaledBox.getCenter(new THREE.Vector3());
                    object.position.set(-center.x, -scaledBox.min.y, -center.z);

                    object.traverse(function (child) { 
                        if (child.isMesh) { 
                            child.castShadow = true; child.receiveShadow = true; 
                            if(child.material) { child.material.needsUpdate = true; }
                        } 
                    });
                    group.remove(placeholder);
                    group.add(object);
                }, undefined, function (error) {
                    console.warn("GLB載入失敗，採用預設方塊", error);
                });

            } else if (obj.style === 'shelf') {
                const poleMat = new THREE.MeshStandardMaterial({ color: 0x475569, metalness: 0.9, roughness: 0.1 });
                const boardMat = new THREE.MeshStandardMaterial({ color: obj.color, metalness: 0.2, roughness: 0.3 });
                const backboard = new THREE.Mesh(new THREE.BoxGeometry(obj.length - 40, obj.height, 40), boardMat);
                backboard.position.y = obj.height/2; backboard.castShadow = true; group.add(backboard);
                [{x: -obj.length/2+15, z: -obj.width/2+15}, {x: obj.length/2-15, z: -obj.width/2+15}, {x: -obj.length/2+15, z: obj.width/2-15}, {x: obj.length/2-15, z: obj.width/2-15}]
                .forEach(p => { const pole = new THREE.Mesh(new THREE.BoxGeometry(30, obj.height, 30), poleMat); pole.position.set(p.x, obj.height/2, p.z); group.add(pole); });
                for (let i = 0; i <= 4; i++) {
                    const board = new THREE.Mesh(new THREE.BoxGeometry(obj.length - 20, 25, obj.width - 20), boardMat);
                    board.position.set(0, 150 + (i * ((obj.height - 300) / 4)), 0); board.castShadow = true; group.add(board);
                }
            } else if (obj.type === 'wall') {
                // 牆身使用純色米灰色，不使用貼圖
                const wallMat = new THREE.MeshStandardMaterial({ color: 0xbab7b1, roughness: 0.38, metalness: 0.92 });
                const base = new THREE.Mesh(new THREE.BoxGeometry(obj.length, obj.height, obj.width), wallMat);
                base.position.y = obj.height/2; base.castShadow = true; base.receiveShadow = true;
                group.add(base);
            } else if (obj.style === 'cabinet') {
                const bH = obj.height * 0.6;
                const base = new THREE.Mesh(new THREE.BoxGeometry(obj.length, bH, obj.width), new THREE.MeshStandardMaterial({ color: obj.color, roughness: 0.2, metalness: 0.6 }));
                base.position.y = bH/2; base.castShadow = true; group.add(base);
                const glass = new THREE.Mesh(new THREE.BoxGeometry(obj.length - 20, obj.height * 0.4, obj.width - 20), new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 }));
                glass.position.y = bH + (obj.height * 0.4)/2; group.add(glass);
            } else if (obj.style === 'pillar') {
                // 柱子使用紋理貼圖
                const textureLoader = new THREE.TextureLoader();
                textureLoader.load('https://raw.githubusercontent.com/citistorekin/3D-Layout-Assets/refs/heads/main/Texture/Paller.jpg', function(texture) {
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.RepeatWrapping;
                    texture.repeat.set(obj.length / 500, obj.height / 500);
                    const pillarMat = new THREE.MeshStandardMaterial({ map: texture, color: obj.color, roughness: 0.6, metalness: 0.3 });
                    const base = new THREE.Mesh(new THREE.BoxGeometry(obj.length, obj.height, obj.width), pillarMat);
                    base.position.y = obj.height/2; base.castShadow = true; base.receiveShadow = true;
                    group.add(base);
                }, undefined, function(error) {
                    console.warn("紋理載入失敗，採用預設材質", error);
                    const base = new THREE.Mesh(new THREE.BoxGeometry(obj.length, obj.height, obj.width), new THREE.MeshStandardMaterial({ color: obj.color, roughness: 0.5, metalness: 0.1 }));
                    base.position.y = obj.height/2; base.castShadow = true; group.add(base);
                });
            } else {
                const base = new THREE.Mesh(new THREE.BoxGeometry(obj.length, obj.height, obj.width), new THREE.MeshStandardMaterial({ color: obj.color, roughness: 0.5, metalness: 0.1 }));
                base.position.y = obj.height/2; base.castShadow = true; group.add(base);
            }
            group.position.set(obj.x - spaceWidth/2, 0, obj.y - spaceHeight/2);
            group.rotation.y = -(obj.angle * Math.PI)/180;
            scene.add(group); threeObjects[obj.id] = group;
        }

        function updateObjectPosition3D(obj) {
            const mesh = threeObjects[obj.id];
            if (mesh) { mesh.position.set(obj.x - spaceWidth/2, 0, obj.y - spaceHeight/2); mesh.rotation.y = -(obj.angle * Math.PI)/180; }
        }

        function removeObject3D(id) { if (threeObjects[id]) { scene.remove(threeObjects[id]); delete threeObjects[id]; } }
        function syncAllObjects3D() { Object.keys(threeObjects).forEach(id => removeObject3D(id)); objects.forEach(obj => createObject3D(obj)); }

        // --- 8. Application Logic & Actions ---
        function buildSystemState(preserveObjects = false) {
            if (!preserveObjects) {
                objects = []; 
                selectedId = null; 
                document.getElementById('selectedObjectName').innerText = "未選取物件";
            }
            updateFloor3D();

        function selectFloorplan(key) {
            const config = FLOORPLAN_PRESETS[key]; if (!config) return;
            document.querySelectorAll('.fp-btn').forEach(btn => { btn.classList.remove('border-indigo-500', 'bg-indigo-950/40', 'text-white'); btn.classList.add('border-slate-700', 'bg-slate-850', 'text-slate-300'); });
            const activeBtn = document.getElementById(`btn-fp-${key}`);
            if (activeBtn) { activeBtn.classList.add('border-indigo-500', 'bg-indigo-950/40', 'text-white'); activeBtn.classList.remove('border-slate-700', 'bg-slate-850', 'text-slate-300'); }

            if (config.autoDetect && config.path && config.path.endsWith('.dxf')) {
                currentPlanKey = key;
                loadFloorplanDXF(config.path, config.defaultW);
            } else {
                currentPlanKey = key;
                floorPolygons = []; wallPolygons = []; 
                spaceWidth = config.width; spaceHeight = config.height; barriers = [];
                if(config.pillars) config.pillars.forEach(pil => barriers.push({ x: pil.x, y: pil.y, w: pil.w, h: pil.h, angle: 0, type: 'pillar' }));
                buildSystemState(false); 
                showToast(`已載入：${config.name}並重設視野。`);
            }
        }

        function addShelfPreset(key) {
            const config = SHELF_PRESETS[key]; if (!config) return;
            const newObj = { id: `shelf-${key}-${Date.now()}`, name: config.name, x: config.length/2 + 50, y: config.width/2 + 50, length: config.length, width: config.width, height: config.height, angle: 0, color: config.color, style: config.style, glbPath: config.glbPath, mirrored: false, description: '' };
            
            let isPlaced = false;
            for (let dy = 0; dy < spaceHeight - config.width; dy += 200) {
                for (let dx = 0; dx < spaceWidth - config.length; dx += 200) {
                    newObj.x = config.length/2 + 50 + dx; newObj.y = config.width/2 + 50 + dy;
                    if (isPositionAllowed(newObj, objects, barriers)) { isPlaced = true; break; }
                }
                if (isPlaced) break;
            }

            if (isPlaced) { objects.push(newObj); selectedId = newObj.id; createObject3D(newObj); drawFloorplan(); showToast(`已增添「${config.name}」。`); } 
            else showToast("無空位可放置新貨架！");
        }

        function rotateSelected(degrees) {
            if (!selectedId) return;
            const obj = objects.find(o => o.id === selectedId); if (!obj) return;
            const nextAngle = (obj.angle + degrees + 360) % 360;
            if (isPositionAllowed({ ...obj, angle: nextAngle }, objects, barriers)) {
                obj.angle = nextAngle; updateObjectPosition3D(obj); drawFloorplan();
            } else {
                showToast("旋轉受阻：旋轉後將會穿透相鄰物件、柱子或邊界！");
            }
        }

                cvs3D.width = 2560;
                cvs3D.height = 1440;
                const ctx3D = cvs3D.getContext('2d');
                ctx3D.drawImage(renderer.domElement, 0, 0);
                
                // 壓縮圖片：降低質量和分辨率以避免 URL 過長
                const compressedCanvas = document.createElement('canvas');
                compressedCanvas.width = 1280;  // 降低到 50% 分辨率
                compressedCanvas.height = 720;
                const compressedCtx = compressedCanvas.getContext('2d');
                compressedCtx.drawImage(cvs3D, 0, 0, 1280, 720);
                
                // 使用較低的 JPEG 質量進行壓縮
                const compressedSnapshot = compressedCanvas.toDataURL('image/jpeg', 0.6);
                
                // 恢復原始渲染器大小
                renderer.setSize(origW, origH);
                camera.aspect = origW / origH;
                camera.updateProjectionMatrix();
                renderer.render(scene, camera);
                
                // 驗證快照是否有效
                if (!compressedSnapshot || compressedSnapshot.length < 100) {
                    loadingOverlay.remove();
                    return showToast("❌ 快照數據無效！");
                }
                
                // 使用後端存儲方案傳遞快照
                const storeUrl = 'https://aispaceplan-8ccnvacn.manus.space/api/snapshot/store';
                
                fetch(storeUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'cors',
                    credentials: 'omit',
                    body: JSON.stringify({
                        snapshotBase64: compressedSnapshot
                    })
                })
                    .then(response => {
                        console.log('[Snapshot] HTTP 響應:', response.status, response.statusText);
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        return response.json();
                    })
                    .then(data => {
                        console.log('[Snapshot] 響應數據:', data);
                        const token = data.token;
                        if (!token) {
                            console.error('[Snapshot] 找不到 token，完整響應:', JSON.stringify(data));
                            throw new Error('無效的 token 響應');
                        }
                        console.log('[Snapshot] 成功獲得 token:', token);
                        const generatorUrl = 'https://aispaceplan-8ccnvacn.manus.space/style-generator?token=' + encodeURIComponent(token);
                        setTimeout(() => {
                            loadingOverlay.remove();
                            window.open(generatorUrl, '_blank');
                        }, 500);
                    })
                    .catch(error => {
                        loadingOverlay.remove();
                        console.error('[Snapshot] 完整錯誤信息:', error.message, error);
                        showToast('❌ 快照傳輸失敗！');
                    });
            } catch (e) {
                loadingOverlay.remove();
                showToast("❌ 擷取快照失敗！");
                console.error('外層錯誤:', e);
            }
        }
        function saveDoubleImages() {
            let plainName;
            if (currentPlanKey === 'Custom') {
                plainName = "自訂空間";
            } else if (currentPlanKey === 'CV_Auto') {
                plainName = "智慧解析空間";
            } else if (FLOORPLAN_PRESETS[currentPlanKey]) {
                plainName = FLOORPLAN_PRESETS[currentPlanKey].name;
            } else {
                plainName = `平面 ${currentPlanKey}`;
            }
            const container = document.getElementById('threeContainer');
            if (!container || !renderer || !camera || !scene) return showToast("❌ 3D 渲染器未就緒！");
            
            try {
                const origW = container.clientWidth, origH = container.clientHeight;
                
                renderer.setSize(2560, 1440, false); camera.aspect = 2560/1440; camera.updateProjectionMatrix(); renderer.render(scene, camera);
                const cvs3D = document.createElement('canvas'); cvs3D.width = 2560; cvs3D.height = 1440; const ctx3D = cvs3D.getContext('2d');
                ctx3D.drawImage(renderer.domElement, 0, 0); drawStatsFooter(ctx3D, plainName);
                ctx3D.fillStyle = 'rgba(15, 23, 42, 0.9)'; ctx3D.fillRect(40, 40, 240, 64);
                ctx3D.fillStyle = '#ffffff'; ctx3D.font = 'bold 22px "Microsoft JhengHei"'; ctx3D.textBaseline = 'middle'; ctx3D.fillText(plainName, 105, 72);
                
                const link3D = document.createElement('a'); link3D.download = `3D_${currentPlanKey}_${Date.now()}.jpg`; link3D.href = cvs3D.toDataURL('image/jpeg', 0.95); link3D.click();
                
                renderer.setSize(origW, origH); camera.aspect = origW/origH; camera.updateProjectionMatrix(); renderer.render(scene, camera);

                // 2D 平面圖導出
                const cvs2D = document.createElement('canvas'); cvs2D.width = 2560; cvs2D.height = 1440; const ctx2D = cvs2D.getContext('2d');
                ctx2D.fillStyle = '#020617'; ctx2D.fillRect(0, 0, 2560, 1440);
                const scX = 2560/(spaceWidth/SCALE), scY = 1440/(spaceHeight/SCALE), tZoom = Math.min(scX, scY)*0.70;
                ctx2D.save(); ctx2D.translate((2560 - (spaceWidth/SCALE)*tZoom)/2, (1440 - (spaceHeight/SCALE)*tZoom)/2 - 40); ctx2D.scale(tZoom, tZoom);
                const swS = spaceWidth/SCALE, shS = spaceHeight/SCALE;
                
                if (floorPolygons && floorPolygons.length > 0) {
                    ctx2D.fillStyle = '#0f172a';
                    floorPolygons.forEach(poly => {
                        ctx2D.beginPath();
                        ctx2D.moveTo(poly[0].x / SCALE, poly[0].y / SCALE);
                        for (let p = 1; p < poly.length; p++) {
                            ctx2D.lineTo(poly[p].x / SCALE, poly[p].y / SCALE);
                        }
                        ctx2D.closePath();
                        ctx2D.fill();
                    });
                } else {
                    ctx2D.fillStyle = '#0f172a'; ctx2D.fillRect(0, 0, swS, shS);
                }

                if (wallPolygons && wallPolygons.length > 0) {
                    ctx2D.strokeStyle = '#475569';
                    ctx2D.lineWidth = 3;
                    wallPolygons.forEach(wall => {
                        ctx2D.beginPath();
                        ctx2D.moveTo(wall[0].x / SCALE, wall[0].y / SCALE);
                        for (let p = 1; p < wall.length; p++) {
                            ctx2D.lineTo(wall[p].x / SCALE, wall[p].y / SCALE);
                        }
                        ctx2D.stroke();
                    });
                }

                ctx2D.strokeStyle = '#1e293b'; ctx2D.lineWidth = 1;
                for (let i=0; i<swS; i+=100) { ctx2D.beginPath(); ctx2D.moveTo(i, 0); ctx2D.lineTo(i, shS); ctx2D.stroke(); }
                for (let j=0; j<shS; j+=100) { ctx2D.beginPath(); ctx2D.moveTo(0, j); ctx2D.lineTo(swS, j); ctx2D.stroke(); }
                
                drawAll2DObjects(ctx2D, SCALE, true);
                
                drawDimensionLine(ctx2D, 0, 0, swS, 0, `${Math.round(spaceWidth)}mm`, -45, false, true);
                drawDimensionLine(ctx2D, swS, 0, swS, shS, `${Math.round(spaceHeight)}mm`, 45, true, true);
                ctx2D.restore();
                
                drawStatsFooter(ctx2D, plainName);
                ctx2D.fillStyle = 'rgba(15, 23, 42, 0.9)'; ctx2D.fillRect(40, 40, 240, 64);
                ctx2D.fillStyle = '#ffffff'; ctx2D.font = 'bold 22px "Microsoft JhengHei"'; ctx2D.textBaseline = 'middle'; ctx2D.fillText(plainName, 105, 72);
                
                const link2D = document.createElement('a'); link2D.download = `2D_${currentPlanKey}_${Date.now()}.jpg`; link2D.href = cvs2D.toDataURL('image/jpeg', 0.95); link2D.click();
                showToast("📸 雙重 2K 高清全景圖像導出成功！");
            } catch (e) { showToast("❌ 導出錯誤！"); console.error(e); }
        }


        // --- 8.6 自訂牆身功能 ---
        function addCustomWall(length, thickness, height) {
            const newWall = {
                id: `wall-${Date.now()}`,
                name: `自訂牆身 ${Math.floor(Math.random() * 1000)}`,
                x: length / 2 + 50,
                y: thickness / 2 + 50,
                length: length,
                width: thickness,
                height: height,
                angle: 0,
                color: '#000000',
                style: 'pillar',
                mirrored: false,
                description: '',
                type: 'wall'
            };
            
            let isPlaced = false;
            for (let dy = 0; dy < spaceHeight - thickness; dy += 200) {
                for (let dx = 0; dx < spaceWidth - length; dx += 200) {
                    newWall.x = length / 2 + 50 + dx;
                    newWall.y = thickness / 2 + 50 + dy;
                    if (isPositionAllowed(newWall, objects, barriers)) {
                        isPlaced = true;
                        break;
                    }
                }
                if (isPlaced) break;
            }
            
            if (isPlaced) {
                objects.push(newWall);
                selectedId = newWall.id;
                createObject3D(newWall);
                drawFloorplan();
                showToast(`✅ 自訂牆身已新增！尺寸：${length}x${thickness}x${height}mm`);
            } else {
                showToast("❌ 無空位可放置新牆身！");
            }
        }

                // --- 8.5 複製/貼上功能 ---
        function copySelectedObject() {
            if (!selectedId) {
                showToast("請先選擇一個物件！");
                return;
            }
            const obj = objects.find(o => o.id === selectedId);
            if (obj) {
                clipboard = JSON.parse(JSON.stringify(obj));
                showToast("✅ 物件已複製到剪貼板！");
            }
        }

        function pasteObject() {
            if (!clipboard) {
                showToast("剪貼板中沒有物件！");
                return;
            }
            const newObj = JSON.parse(JSON.stringify(clipboard));
            newObj.id = `shelf-${Date.now()}`;
            
            // 嘗試在原物件旁邊放置，如果失敗則自動尋找空位
            let isPlaced = false;
            const offsetStep = 150;
            const maxAttempts = 20;
            
            for (let attempt = 0; attempt < maxAttempts && !isPlaced; attempt++) {
                // 嘗試四個方向：右、下、左、上
                const directions = [
                    { dx: offsetStep * (attempt + 1), dy: 0 },  // 右
                    { dx: 0, dy: offsetStep * (attempt + 1) },  // 下
                    { dx: -offsetStep * (attempt + 1), dy: 0 }, // 左
                    { dx: 0, dy: -offsetStep * (attempt + 1) }  // 上
                ];
                
                for (let dir of directions) {
                    newObj.x = clipboard.x + dir.dx;
                    newObj.y = clipboard.y + dir.dy;
                    
                    // 檢查是否在空間範圍內
                    if (newObj.x - newObj.length/2 < 0 || newObj.x + newObj.length/2 > spaceWidth ||
                        newObj.y - newObj.width/2 < 0 || newObj.y + newObj.width/2 > spaceHeight) {
                        continue;
                    }
                    
                    if (isPositionAllowed(newObj, objects, barriers)) {
                        isPlaced = true;
                        break;
                    }
                }
            }
            
            if (isPlaced) {
                objects.push(newObj);
                selectedId = newObj.id;
                createObject3D(newObj);
                drawFloorplan();
                showToast("✅ 物件已貼上！");
            } else {
                showToast("❌ 無足夠空位貼上物件，請先清理空間！");
            }
        }

        // --- 9. Event Listeners ---
        function initEventListeners() {
            canvas.addEventListener('wheel', e => {
                e.preventDefault(); const m = getMousePos(e); zoom = Math.max(0.015, Math.min(1.5, zoom * (e.deltaY < 0 ? 1.15 : 1/1.15)));
                const worldPos = { x: ((m.x - panX) / (zoom / (e.deltaY < 0 ? 1.15 : 1/1.15))) * SCALE, y: ((m.y - panY) / (zoom / (e.deltaY < 0 ? 1.15 : 1/1.15))) * SCALE };
                panX = m.x - (worldPos.x / SCALE) * zoom;
                panY = m.y - (worldPos.y / SCALE) * zoom;
                drawFloorplan();
            }, { passive: false });

            canvas.addEventListener('mousedown', e => {
                const m = getMousePos(e);
                if (e.button === 1 || e.button === 2) {
                    isPanning = true;
                    lastPanMouse = m;
                    e.preventDefault();
                    return;
                }
                if (e.button === 0) {
                    const clickPos = canvasToWorld(e); let found = null;
                    for (let i = objects.length-1; i >= 0; i--) {
                        const o = objects[i], dx = clickPos.x - o.x, dy = clickPos.y - o.y, rad = (-o.angle*Math.PI)/180, cos = Math.cos(rad), sin = Math.sin(rad);
                        if (Math.abs(dx*cos - dy*sin) <= o.length/2 && Math.abs(dx*sin + dy*cos) <= o.width/2) { found = o; break; }
                    }
                    if (found) {
                        selectedId = found.id; isDragging = true; dragOffset = { x: clickPos.x - found.x, y: clickPos.y - found.y };
                        const dispName = found.name;
                        document.getElementById('selectedObjectName').innerHTML = `<i class="fa-solid fa-cube text-emerald-400 mr-1.5"></i> ${dispName}`;
                        document.getElementById('objectDescriptionInputFull').value = found.description || '';
                        document.getElementById('descriptionInputContainer').classList.remove('hidden');
                    } else { 
                        selectedId = null; 
                        document.getElementById('selectedObjectName').innerText = "未選取物件";
                        document.getElementById('descriptionInputContainer').classList.add('hidden');
                        isPanning = true;
                        lastPanMouse = m;
                    }
                    drawFloorplan();
                }
            });

            canvas.addEventListener('mousemove', e => {
                const m = getMousePos(e);
                if (isPanning) { 
                    panX += m.x - lastPanMouse.x; panY += m.y - lastPanMouse.y; 
                    lastPanMouse = m; drawFloorplan(); return; 
                }
                if (!isDragging || !selectedId) return;
                const clickPos = canvasToWorld(e), obj = objects.find(o => o.id === selectedId); if (!obj) return;
                
                let tx = clickPos.x - dragOffset.x, ty = clickPos.y - dragOffset.y;
                
                const canMoveRawX = isPositionAllowed({ ...obj, x: tx }, objects, barriers);
                const canMoveRawY = isPositionAllowed({ ...obj, y: ty }, objects, barriers);

                const snapped = getSnappedPosition(obj, tx, ty);
                
                let finalX = tx;
                let finalY = ty;

                if (isPositionAllowed({ ...obj, x: snapped.x, y: snapped.y }, objects, barriers)) {
                    finalX = snapped.x;
                    finalY = snapped.y;
                } else if (isPositionAllowed({ ...obj, x: snapped.x, y: ty }, objects, barriers)) {
                    finalX = snapped.x;
                    finalY = ty;
                } else if (isPositionAllowed({ ...obj, x: tx, y: snapped.y }, objects, barriers)) {
                    finalX = tx;
                    finalY = snapped.y;
                } else {
                    if (canMoveRawX) finalX = tx;
                    if (canMoveRawY) finalY = ty;
                }

                let moved = false;
                if (isPositionAllowed({ ...obj, x: finalX, y: finalY }, objects, barriers)) {
                    obj.x = finalX;
                    obj.y = finalY;
                    moved = true;
                } else {
                    if (isPositionAllowed({ ...obj, x: finalX }, objects, barriers)) {
                        obj.x = finalX;
                        moved = true;
                    }
                    if (isPositionAllowed({ ...obj, y: finalY }, objects, barriers)) {
                        obj.y = finalY;
                        moved = true;
                    }
                }
                
                if (moved) updateObjectPosition3D(obj);
                document.getElementById('collisionAlert').classList.toggle('hidden', Math.abs(tx - obj.x) <= 1 && Math.abs(ty - obj.y) <= 1);
                drawFloorplan();
            });

            window.addEventListener('mouseup', e => { isPanning = false; isDragging = false; document.getElementById('collisionAlert').classList.add('hidden'); });

            // ⭐ 修改項目 3: 偵測如果用戶將瀏覽器縮放、高寬調整時，完美 refresh 2D 平面圖及 3D 即時視窗 ⭐
            window.addEventListener('resize', () => {
                resizeCanvas();
                const container = document.getElementById('threeContainer');
                if (container && camera && renderer) {
                    camera.aspect = (container.clientWidth || 500) / (container.clientHeight || 500);
                    camera.updateProjectionMatrix();
                    renderer.setSize(container.clientWidth || 500, container.clientHeight || 500);
                }
                drawFloorplan();
            });

            document.getElementById('customSpaceForm').addEventListener('submit', e => {
                e.preventDefault(); spaceWidth = parseInt(document.getElementById('customWidth').value); spaceHeight = parseInt(document.getElementById('customHeight').value);
                currentPlanKey = 'Custom'; floorPolygons = []; wallPolygons = []; barriers = []; buildSystemState(); closeModal('customSpaceModal');
                document.querySelectorAll('.fp-btn').forEach(btn => { btn.classList.remove('border-indigo-500', 'bg-indigo-950/40', 'text-white'); btn.classList.add('border-slate-700', 'bg-slate-850', 'text-slate-300'); });
                showToast(`客製化空間已生成：${spaceWidth} x ${spaceHeight} mm！`);
            });

            document.getElementById('rotateLeftBtn').onclick = () => rotateSelected(-45);
            document.getElementById('rotateRightBtn').onclick = () => rotateSelected(45);
            
            document.getElementById('mirrorObjectBtn').onclick = () => {
                if (selectedId) {
                    const obj = objects.find(o => o.id === selectedId);
                    if (obj) {
                        obj.mirrored = !obj.mirrored;
                        createObject3D(obj);
                        drawFloorplan();
                        const dispName = obj.name;
                        document.getElementById('selectedObjectName').innerHTML = `<i class="fa-solid fa-cube text-emerald-400 mr-1.5"></i> ${dispName}`;
                        showToast(`已${obj.mirrored ? '啟用' : '停用'}鏡像。`);
                    }
                } else {
                    showToast("請先選擇一個物件！");
                }
            };

            // 自訂牆身表單事件監聽
            const wallFormElement = document.getElementById('customWallForm');
            if (wallFormElement) {
                wallFormElement.addEventListener('submit', e => {
                    e.preventDefault();
                    const length = parseInt(document.getElementById('wallLength').value);
                    const thickness = parseInt(document.getElementById('wallThickness').value);
                    const height = parseInt(document.getElementById('wallHeight').value);
                    
                    if (length && thickness && height) {
                        addCustomWall(length, thickness, height);
                        closeModal('customWallModal');
                        wallFormElement.reset();
                    } else {
                        showToast("❌ 請填入所有牆身參數！");
                    }
                });
            }

                        document.getElementById('deleteObjectBtn').onclick = () => {
                if (selectedId) { objects = objects.filter(o => o.id !== selectedId); removeObject3D(selectedId); selectedId = null; document.getElementById('selectedObjectName').innerText = "未選取物件"; drawFloorplan(); }
            };
            document.getElementById('zoomInBtn').onclick = () => { zoom = Math.min(1.5, zoom * 1.2); drawFloorplan(); };
            document.getElementById('zoomOutBtn').onclick = () => { zoom = Math.max(0.015, zoom / 1.2); drawFloorplan(); };
            document.getElementById('copyObjectBtn').onclick = copySelectedObject;
            document.getElementById('pasteObjectBtn').onclick = pasteObject;

            // Keyboard shortcuts: Ctrl+C copy, Ctrl+V paste
            document.addEventListener('keydown', e => {
                if (e.ctrlKey && e.key === 'c') {
                    e.preventDefault();
                    copySelectedObject();
                } else if (e.ctrlKey && e.key === 'v') {
                    e.preventDefault();
                    pasteObject();
                }
            });

            // 物件說明文字輸入框事件
            document.getElementById('objectDescriptionInputFull').addEventListener('input', e => {
                if (selectedId) {
                    const obj = objects.find(o => o.id === selectedId);
                    if (obj) {
                        obj.description = e.target.value;
                        drawFloorplan();
                    }
                }
            });

            // 描述文字輸入框的失焦事件
            document.getElementById('objectDescriptionInputFull').addEventListener('blur', () => {
                setTimeout(() => {
                    if (!selectedId) {
                        document.getElementById('descriptionInputContainer').classList.add('hidden');
                    }
                }, 100);
            });
        }

        // --- 10. Bootstrap ---
        window.onload = function() {
            initThree();
            preloadTextures(); 
            selectFloorplan('A'); 
            initEventListeners();
            
            setTimeout(() => {
                resizeCanvas();
                const container = document.getElementById('threeContainer');
                if (container && camera && renderer) {
                    camera.aspect = (container.clientWidth || 500) / (container.clientHeight || 500);
                    camera.updateProjectionMatrix();
                    renderer.setSize(container.clientWidth || 500, container.clientHeight || 500);
                }
                drawFloorplan();
                
                const loaderMask = document.getElementById('threeLoading');
                if (loaderMask) { loaderMask.classList.add('opacity-0'); setTimeout(() => loaderMask.classList.add('hidden'), 300); }
            }, 150);

            animate();
            showToast("✅ 智慧 3D 規劃系統已完全就緒！已完成功能升級優化。");
        };
    </script>
