<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 空間佈局規劃系統(Kin Tang)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .scroller-clean { scrollbar-width: thin; scrollbar-color: #475569 #1e293b; scroll-behavior: smooth; }
        .scroller-clean::-webkit-scrollbar { width: 4px; }
        .scroller-clean::-webkit-scrollbar-track { background: #111827; }
        .scroller-clean::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }
        #loadingOverlay { transition: opacity 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-screen flex flex-col font-sans overflow-hidden select-none">

    <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between shadow-lg shrink-0 h-16">
        <div class="flex items-center space-x-3">
            <div class="bg-indigo-600 p-2.5 rounded-lg text-white shadow-md flex items-center justify-center">
                <i class="fa-solid fa-cubes text-lg animate-pulse"></i>
            </div>
            <div>
                <h1 class="text-base font-bold tracking-wider text-white leading-tight">3D 空間佈局規劃系統</h1>
                <p class="text-[10px] text-slate-400">DXF 向量解析生成 • 3D 即時聯動防穿透</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <!-- 儲存與載入佈局檔案按鈕 -->
            <button onclick="saveLayoutFile()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-2 rounded-lg text-xs font-semibold transition flex items-center gap-1.5 h-9" title="儲存當前擺設配置與所有貨架佈局">
                <i class="fa-solid fa-floppy-disk text-sm"></i>
                儲存佈局
            </button>
            <button onclick="document.getElementById('layoutLoadInput').click()" class="bg-slate-800 hover:bg-slate-700 text-white px-3 py-2 rounded-lg text-xs font-semibold transition border border-slate-600 flex items-center gap-1.5 h-9" title="載入上次擺設配置與所有貨架佈局">
                <i class="fa-solid fa-folder-open text-sm"></i>
                載入佈局
            </button>
            <input type="file" id="layoutLoadInput" accept=".json" class="hidden" onchange="loadLayoutFile(event)">

            <span class="w-px h-6 bg-slate-800 mx-1"></span>
            
            <button onclick="saveDoubleImages()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-xs font-semibold transition flex items-center gap-1.5 shadow-lg shadow-emerald-600/20 h-9">
                <i class="fa-solid fa-camera text-sm"></i>
                儲存圖像 (2D平面與3D預覽圖)
            </button>

            <!-- ⭐ 新增項目 5: AI生成風格及上貨效果按鈕 ⭐ -->
            <button onclick="openAISpacePlanner()" class="bg-violet-600 hover:bg-violet-500 text-white px-4 py-2 rounded-lg text-xs font-semibold transition flex items-center gap-1.5 shadow-lg shadow-violet-600/20 h-9" title="點擊在新視窗中打開生成功能">
                <i class="fa-solid fa-wand-magic-sparkles text-sm"></i>
                AI生成風格及商品渲染  
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative w-full h-full bg-slate-950">
        
        <div class="w-24 bg-slate-900 border-r border-slate-800/80 flex flex-col items-center py-4 gap-2.5 shrink-0 h-full overflow-y-auto scroller-clean">
            <div class="text-[10px] font-bold text-indigo-400 uppercase mb-1">平面圖選擇</div>
            <button onclick="selectFloorplan('A')" id="btn-fp-A" class="fp-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:bg-slate-800 hover:border-indigo-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-map text-xs"></i><span>Apita EventA</span>
            </button>
            <button onclick="selectFloorplan('B')" id="btn-fp-B" class="fp-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:bg-slate-800 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-map text-xs"></i><span>Lok Fu EventB</span>
            </button>
            <button onclick="selectFloorplan('C')" id="btn-fp-C" class="fp-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:bg-slate-800 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-map text-xs"></i><span>Apita Bedding Entrance</span>
            </button>
            <button onclick="selectFloorplan('D')" id="btn-fp-D" class="fp-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:bg-slate-800 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-map text-xs"></i><span>平面 D</span>
            </button>
            <button onclick="selectFloorplan('E')" id="btn-fp-E" class="fp-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:bg-slate-800 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-map text-xs"></i><span>平面 E</span>
            </button>
            <button onclick="selectFloorplan('F')" id="btn-fp-F" class="fp-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:bg-slate-800 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-map text-xs"></i><span>平面 F</span>
            </button>
            <button onclick="selectFloorplan('G')" id="btn-fp-G" class="fp-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:bg-slate-800 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-map text-xs"></i><span>平面 G</span>
            </button>
            <button onclick="selectFloorplan('H')" id="btn-fp-H" class="fp-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:bg-slate-800 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-map text-xs"></i><span>平面 H</span>
            </button>
            <div class="w-12 h-px bg-slate-800 my-1"></div>
            <button onclick="openModal('customSpaceModal')" class="w-16 py-2.5 rounded-lg border border-dashed border-slate-700 hover:border-indigo-500 bg-slate-900/55 hover:bg-slate-800 text-[10px] font-bold text-indigo-400 flex flex-col items-center gap-1 shadow-md">
                <i class="fa-solid fa-vector-square text-sm"></i><span>自訂空間</span>
            </button>
        </div>

        <div class="w-24 bg-slate-900 border-r border-slate-800 flex flex-col items-center py-4 gap-2.5 shrink-0 h-full overflow-y-auto scroller-clean">
            <div class="text-[10px] font-bold text-emerald-400 uppercase mb-1">增添貨架</div>
            <button onclick="addShelfPreset('A')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
               <i class="fa-solid fa-layer-group text-xs"></i><span>Wooden Car</span>
            </button>
            <button onclick="addShelfPreset('B')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-layer-group text-xs"></i><span>3 Layer Table</span>
            </button>
            <button onclick="addShelfPreset('C')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-layer-group text-xs"></i><span>Wagon(S)</span>
            </button>
            <button onclick="addShelfPreset('D')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-layer-group text-xs"></i><span>Wagon</span>
            </button>
            <button onclick="addShelfPreset('E')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-layer-group text-xs"></i><span>Stall</span>
            </button>
            <button onclick="addShelfPreset('F')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-layer-group text-xs"></i><span>1.8mOpen </span>
            </button>
            <button onclick="addShelfPreset('G')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-layer-group text-xs"></i><span>2mOpen </span>
            </button>
            <button onclick="addShelfPreset('H')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-layer-group text-xs"></i><span>1.2m Frezzer </span>
            </button>
            <button onclick="addShelfPreset('I')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-layer-group text-xs"></i><span>1.7m Frezzer</span>
            </button>
            <button onclick="addShelfPreset('J')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-layer-group text-xs"></i><span>Top Freezer(M)</span>
            </button>
            <button onclick="addShelfPreset('K')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
                <i class="fa-solid fa-layer-group text-xs"></i><span>Top Freezer(L)</span>
            </button>
            <button onclick="addShelfPreset('L')" class="shelf-btn w-16 h-14 rounded-lg border border-slate-700 bg-slate-850 hover:border-emerald-500 text-xs font-bold transition flex flex-col items-center justify-center gap-0.5 text-slate-300">
            <i class="fa-solid fa-layer-group text-xs"></i><span>Plasticbox</span>
            </button>
    
            <div class="w-12 h-px bg-slate-800 my-1"></div>
            <button onclick="openModal('customWallModal')" class="w-16 py-2.5 rounded-lg border border-dashed border-slate-700 hover:border-emerald-500 bg-slate-900/55 hover:bg-slate-800 text-[10px] font-bold text-emerald-400 flex flex-col items-center gap-1 shadow-md">
                <i class="fa-solid fa-rectangle-landscape text-sm"></i><span>自訂牆身</span>
            </button>
        </div>

        <div class="flex-1 flex overflow-hidden h-full">
            <div class="w-1/2 p-4 flex flex-col border-r border-slate-800 bg-slate-900/50 h-full">
                <div class="flex items-center justify-between mb-3 px-1 shrink-0">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                        <h2 class="text-xs font-bold uppercase tracking-wider text-slate-300">2D 平面圖視窗</h2>
                    </div>
                    <div class="flex items-center gap-2 text-[10px] text-slate-400">
                        <span><i class="fa-solid fa-mouse-pointer text-indigo-400"></i> 左鍵/右鍵拖曳平移</span> |
                        <span><i class="fa-solid fa-rotate-right text-emerald-400"></i> 中鍵滾動縮放</span>
                    </div>
                </div>

                <div class="flex-1 bg-slate-950 rounded-xl border border-slate-800 relative overflow-hidden shadow-inner">
                    <canvas id="floorplanCanvas" class="absolute inset-0 w-full h-full cursor-grab active:cursor-grabbing"></canvas>
                    
                    <div class="absolute bottom-4 left-4 right-4 bg-slate-900/95 backdrop-blur-md border border-slate-700/50 rounded-lg p-2.5 flex items-center justify-between text-[11px] text-slate-300 z-10">
                        <div class="flex items-center gap-3">
                            <span id="selectedObjectName" class="font-semibold text-indigo-400">未選取物件</span>
                            <span id="collisionAlert" class="text-rose-400 font-bold hidden flex items-center gap-1 animate-bounce">
                                <i class="fa-solid fa-triangle-exclamation"></i> 碰撞阻擋！
                            </span>
                        </div>
                        <input type="text" id="objectDescriptionInput" placeholder="輸入物件說明文字..." class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-xs text-slate-200 placeholder-slate-500 hidden" maxlength="50">
                        <div class="flex gap-1.5 items-center">
                            <button id="rotateLeftBtn" class="bg-slate-800 hover:bg-slate-700 p-1 px-2 rounded border border-slate-700 transition" title="逆時針轉 45°">
                                <i class="fa-solid fa-rotate-left text-slate-300"></i> -45°
                            </button>
                            <button id="rotateRightBtn" class="bg-slate-800 hover:bg-slate-700 p-1 px-2 rounded border border-slate-700 transition" title="順時針轉 45°">
                                <i class="fa-solid fa-rotate-right text-slate-300"></i> +45°
                            </button>
                            <button id="mirrorObjectBtn" class="bg-slate-800 hover:bg-slate-700 p-1 px-2 rounded border border-slate-700 transition" title="前後水平鏡像切換">
                                <i class="fa-solid fa-arrows-left-right text-slate-300"></i> 鏡像
                            </button>
                            <button id="copyObjectBtn" class="bg-slate-800 hover:bg-slate-700 p-1 px-2 rounded border border-slate-700 transition" title="複製選取的物件 (Ctrl+C)">
                                <i class="fa-solid fa-copy text-slate-300"></i> 複製
                            </button>
                            <button id="pasteObjectBtn" class="bg-slate-800 hover:bg-slate-700 p-1 px-2 rounded border border-slate-700 transition" title="貼上複製的物件 (Ctrl+V)">
                                <i class="fa-solid fa-paste text-slate-300"></i> 貼上
                            </button>
                            <button id="deleteObjectBtn" class="bg-rose-950/50 hover:bg-rose-900 border border-rose-800 text-rose-300 p-1 px-2 rounded transition">
                                <i class="fa-solid fa-trash-can"></i> 刪除
                            </button>
                        </div>
                    </div>

                    <!-- 物件說明文字輸入框 -->
                    <div class="absolute bottom-24 left-4 right-4 bg-slate-900/95 backdrop-blur-md border border-slate-700/50 rounded-lg p-2.5 text-[11px] text-slate-300 z-10 hidden" id="descriptionInputContainer">
                        <label class="block text-slate-400 mb-1.5">物件說明文字：</label>
                        <input type="text" id="objectDescriptionInputFull" placeholder="輸入物件說明文字..." class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 placeholder-slate-500" maxlength="100">
                    </div>

                    <!-- ⭐ 修改項目 4: 取消縮小功能按鈕下方不知名(復位)按鈕 ⭐ -->
                    <div class="absolute top-4 right-4 flex flex-col gap-1.5 z-10">
                        <button id="zoomInBtn" class="bg-slate-800/90 hover:bg-slate-700 text-slate-200 w-8 h-8 rounded-lg border border-slate-700 transition"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                        <button id="zoomOutBtn" class="bg-slate-800/90 hover:bg-slate-700 text-slate-200 w-8 h-8 rounded-lg border border-slate-700 transition"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                    </div>
                </div>
            </div>

            <div class="w-1/2 p-4 flex flex-col bg-slate-900/30 h-full">
                <div class="flex items-center justify-between mb-3 px-1 shrink-0">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-indigo-500 animate-pulse"></span>
                        <h2 class="text-xs font-bold uppercase tracking-wider text-slate-300">3D 即時預覽效果圖</h2>
                    </div>
                    <span class="text-[10px] text-slate-500"><i class="fa-solid fa-camera"></i> 滑鼠右鍵旋轉 / 中鍵縮放</span>
                </div>

                <div class="flex-1 bg-slate-950 rounded-xl border border-slate-800 relative overflow-hidden shadow-inner" id="threeContainer">
                    <div id="threeLoading" class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm flex flex-col items-center justify-center z-20 transition-opacity duration-300 pointer-events-none">
                        <i class="fa-solid fa-circle-notch text-indigo-500 text-3xl animate-spin mb-2"></i>
                        <p class="text-xs text-slate-400">正在渲染高品質 3D 場景...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[100] hidden flex-col items-center justify-center">
        <div class="relative w-20 h-20 mb-4">
            <div class="absolute inset-0 border-4 border-indigo-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
            <i class="fa-solid fa-eye text-indigo-400 text-2xl absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
        </div>
        <h3 id="loadingText" class="text-lg font-bold text-white tracking-widest text-center">正在讀取 DXF 向量圖層數據...</h3>
        <p class="text-xs text-slate-400 mt-2">自動轉換 FLOOR (空間) • WALL (牆體) • COLUMN (柱結構)</p>
    </div>

    <div id="customSpaceModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform">
            <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-950/50">
                <h3 class="text-sm font-bold text-white"><i class="fa-solid fa-vector-square text-indigo-500"></i> 自訂空間尺寸</h3>
                <button onclick="closeModal('customSpaceModal')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form id="customSpaceForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-semibold text-slate-400 mb-1.5">長度 (mm)</label>
                    <input type="number" id="customWidth" required min="1000" max="60000" value="12000" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-xs">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-400 mb-1.5">寬度 (mm)</label>
                    <input type="number" id="customHeight" required min="1000" max="60000" value="8500" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-xs">
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal('customSpaceModal')" class="bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-xs">取消</button>
                    <button type="submit" class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-xs font-semibold">生成畫布</button>
                </div>
            </form>
        </div>
    </div>

    <div id="customWallModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform">
            <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-950/50">
                <h3 class="text-sm font-bold text-white"><i class="fa-solid fa-rectangle-landscape text-emerald-500"></i> 自訂牆身</h3>
                <button onclick="closeModal('customWallModal')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form id="customWallForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-semibold text-slate-400 mb-1.5">長度 (mm)</label>
                    <input type="number" id="wallLength" required min="100" max="30000" value="2000" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-xs">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-400 mb-1.5">厚度 (mm)</label>
                    <input type="number" id="wallThickness" required min="50" max="1000" value="200" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-xs">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-400 mb-1.5">高度 (mm)</label>
                    <input type="number" id="wallHeight" required min="500" max="5000" value="2400" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-xs">
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal('customWallModal')" class="bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-xs">取消</button>
                    <button type="submit" class="bg-emerald-600 text-white px-5 py-2 rounded-lg text-xs font-semibold">新增牆身</button>
                </div>
            </form>
        </div>

        };

        // DXF 向量儲存結構
        let floorPolygons = [];

        // 3D Three.js State
        let scene, camera, renderer, floorMesh, pillarsGroup, wallGroup;

        let threeObjects = {};

        // --- 3. UI Helpers ---
        function showToast(msg) {

        // 模糊層級匹配演算法
        function matchLayer(layerName) {
            if (!layerName) return '';
            const upper = layerName.toUpperCase().trim();
            if (upper.includes('FLOOR')) return 'FLOOR';
            if (upper.includes('COLUMN') || upper.includes('COL') || upper.includes('PILLAR') || upper.includes('PIL')) return 'COLUMN';
            if (upper.includes('WALL')) return 'WALL';
            return '';
        }

        // --- 4. 🚀 DXF 向量解析引擎 (支援 HATCH, SPLINE 與經典 POLYLINE) 🚀 ---
        // 🚨 移除本機上傳功能按鈕，但保留底層預設 DXF 雲端解算與解析程式，防止 Preset A & B 無法初始化 🚨
        function handleDxfUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => processDxfContent(ev.target.result, 12000);
            reader.readAsText(file);
        }

        function parseDxfText(dxfText) {
            const lines = dxfText.split(/\r?\n/);
            const parsed = { floor: [], columns: [], walls: [] };
            
            let entities = [];
            let currentEntity = null;
            
            const data = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line === "") continue;
                data.push(line);
            }
            
            let i = 0;
            while (i < data.length - 1) {
                const code = parseInt(data[i]);
                const val = data[i+1];
                i += 2;
                
                if (code === 0) {
                    if (currentEntity) {
                        entities.push(currentEntity);
                        currentEntity = null;
                    }
                    const upperVal = val.toUpperCase().trim();
                    if (['LINE', 'LWPOLYLINE', 'POLYLINE', 'VERTEX', 'SEQEND', 'CIRCLE', 'ARC', 'HATCH', 'SPLINE'].includes(upperVal)) {
                        currentEntity = { 
                            type: upperVal, 
                            layer: '', 
                            points: [], 
                            x: NaN, y: NaN, 
                            x2: NaN, y2: NaN, 
                            r: NaN, 
                            startAngle: NaN, endAngle: NaN 
                        };
                    }
                } else if (currentEntity) {
                    if (code === 8) {
                        currentEntity.layer = val.toUpperCase().trim();
                    } else if (code === 10) {
                        const num = parseFloat(val);
                        currentEntity.x = num;
                        if (['LWPOLYLINE', 'VERTEX', 'HATCH', 'SPLINE'].includes(currentEntity.type)) {
                            currentEntity.points.push({ x: num, y: NaN });
                        }
                    } else if (code === 20) {
                        const num = parseFloat(val);
                        currentEntity.y = num;
                        if (['LWPOLYLINE', 'VERTEX', 'HATCH', 'SPLINE'].includes(currentEntity.type) && currentEntity.points.length > 0) {
                            currentEntity.points[currentEntity.points.length - 1].y = num;
                        }
                    } else if (code === 11) {
                        currentEntity.x2 = parseFloat(val);
                    } else if (code === 21) {
                        currentEntity.y2 = parseFloat(val);
                    } else if (code === 40) {
                        currentEntity.r = parseFloat(val);
                    } else if (code === 50) {
                        currentEntity.startAngle = parseFloat(val);
                    } else if (code === 51) {
                        currentEntity.endAngle = parseFloat(val);
                    }
                }
            }
            if (currentEntity) entities.push(currentEntity);
            
            let activePolyline = null;
            
            entities.forEach(ent => {
                const layer = matchLayer(ent.layer || (activePolyline ? activePolyline.layer : ''));
                if (layer === 'FLOOR' || layer === 'COLUMN' || layer === 'WALL') {
                    const list = layer === 'FLOOR' ? parsed.floor : (layer === 'COLUMN' ? parsed.columns : parsed.walls);
                    
                    if (ent.type === 'LINE') {
                        if (!isNaN(ent.x) && !isNaN(ent.y) && !isNaN(ent.x2) && !isNaN(ent.y2)) {
                            list.push({ type: 'line', points: [{ x: ent.x, y: ent.y }, { x: ent.x2, y: ent.y2 }] });
                        }
                    } else if (['LWPOLYLINE', 'HATCH', 'SPLINE'].includes(ent.type)) {
                        const validPts = ent.points.filter(p => !isNaN(p.x) && !isNaN(p.y));
                        if (validPts.length > 0) {
                            list.push({ type: 'polygon', points: validPts });
                        }
                    } else if (ent.type === 'POLYLINE') {
                        activePolyline = { layer: layer, points: [] };
                    } else if (ent.type === 'VERTEX' && activePolyline) {
                        const validPts = ent.points.filter(p => !isNaN(p.x) && !isNaN(p.y));
                        if (validPts.length > 0) {
                            activePolyline.points.push(validPts[0]);
                        }
                    } else if (ent.type === 'CIRCLE') {
                        if (!isNaN(ent.x) && !isNaN(ent.y) && !isNaN(ent.r)) {
                            const pts = [];
                            for (let a = 0; a < 32; a++) {
                                const rad = (a / 32) * Math.PI * 2;
                                pts.push({ x: ent.x + Math.cos(rad) * ent.r, y: ent.y + Math.sin(rad) * ent.r });
                            }
                            list.push({ type: 'polygon', points: pts });
                        }
                    } else if (ent.type === 'ARC') {
                        if (!isNaN(ent.x) && !isNaN(ent.y) && !isNaN(ent.r) && !isNaN(ent.startAngle) && !isNaN(ent.endAngle)) {
                            const pts = [];
                            const startRad = (ent.startAngle * Math.PI) / 180;
                            const endRad = (ent.endAngle * Math.PI) / 180;
                            const diff = endRad < startRad ? (endRad + Math.PI * 2 - startRad) : (endRad - startRad);
                            const steps = 16;
                            for (let s = 0; s <= steps; s++) {
                                const rad = startRad + (s / steps) * diff;
                                pts.push({ x: ent.x + Math.cos(rad) * ent.r, y: ent.y + Math.sin(rad) * ent.r });
                            }
                            list.push({ type: 'line', points: pts });
                        }
                    }
                }
                
                if (ent.type === 'SEQEND' && activePolyline) {
                    const targetList = activePolyline.layer === 'FLOOR' ? parsed.floor : (activePolyline.layer === 'COLUMN' ? parsed.columns : parsed.walls);
                    if (activePolyline.points.length > 0) {
                        targetList.push({ type: 'polygon', points: activePolyline.points });
                    }
                    activePolyline = null;
                }
            });
            
            return parsed;
        }

        // ⭐ 拓撲向量拼接器 - 自動將零散的 ARC 與 LINE 融合成完美的封閉多邊形，重建正確空間輪廓 ⭐
        function joinSegments(entities) {
            if (entities.length === 0) return [];
            
            let closedPolys = [];
            let openPaths = [];
            
            entities.forEach(ent => {
                if (ent.points && ent.points.length > 1) {
                    const p0 = ent.points[0];
                    const pN = ent.points[ent.points.length - 1];
                    const dist = Math.hypot(pN.x - p0.x, pN.y - p0.y);
                    if (ent.type === 'polygon' && (dist < 10 || ent.points.length > 8)) {
                        closedPolys.push(ent.points);
                    } else {
                        openPaths.push([...ent.points]);
                    }
                }
            });
            
            const joined = [...closedPolys];
            const TOLERANCE = 100.0; // 100mm (10cm) 拼接端點容差
            
            while (openPaths.length > 0) {
                let current = openPaths.shift();
                let growing = true;
                
                while (growing) {
                    growing = false;
                    let lastPt = current[current.length - 1];
                    
                    // 尋找能對接在尾部的線段
                    for (let j = 0; j < openPaths.length; j++) {
                        let nextPath = openPaths[j];
                        let startPt = nextPath[0];
                        let endPt = nextPath[nextPath.length - 1];
                        
                        if (Math.hypot(startPt.x - lastPt.x, startPt.y - lastPt.y) < TOLERANCE) {
                            current = current.concat(nextPath.slice(1));
                            openPaths.splice(j, 1);
                            growing = true;
                            break;
                        }
                        if (Math.hypot(endPt.x - lastPt.x, endPt.y - lastPt.y) < TOLERANCE) {
                            const rev = [...nextPath].reverse();
                            current = current.concat(rev.slice(1));
                            openPaths.splice(j, 1);
                            growing = true;
                            break;
                        }
                    }
                    
                    if (!growing) {
                        // 尋找能對接在頭部的線段
                        let firstPt = current[0];
                        for (let j = 0; j < openPaths.length; j++) {
                            let nextPath = openPaths[j];
                            let startPt = nextPath[0];
                            let endPt = nextPath[nextPath.length - 1];
                            
                            if (Math.hypot(endPt.x - firstPt.x, endPt.y - firstPt.y) < TOLERANCE) {
                                current = nextPath.slice(0, -1).concat(current);
                                openPaths.splice(j, 1);
                                growing = true;
                                break;
                            }
                            if (Math.hypot(startPt.x - firstPt.x, startPt.y - firstPt.y) < TOLERANCE) {
                                const rev = [...nextPath].reverse();
                                current = rev.slice(0, -1).concat(current);
                                openPaths.splice(j, 1);
                                growing = true;
                                break;
                            }
                        }
                    }
                }
                
                if (current.length > 2) {
                    const p0 = current[0];
                    const pN = current[current.length - 1];
                    // 如果首尾沒完全相連，手動推入首點強制封閉多邊形
                    if (Math.hypot(pN.x - p0.x, pN.y - p0.y) > 5) {
                        current.push({ x: p0.x, y: p0.y });
                    }
                    joined.push(current);
                }
            }
            return joined;
        }

        // 精準重寫空間範圍計算，優先使用 FLOOR 圖層決定空間尺寸，防禦 Outlier 線條拉伸
        function processDxfContent(dxfText, defaultW) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden'); overlay.style.display = 'flex';
            
            setTimeout(() => {
                try {
                    const parsed = parseDxfText(dxfText);
                    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;

                    const updateBounds = (pt) => {
                        if (pt.x < minX) minX = pt.x; if (pt.x > maxX) maxX = pt.x;
                        if (pt.y < minY) minY = pt.y; if (pt.y > maxY) maxY = pt.y;
                    };

                    // 優先使用 FLOOR 向量層作為尺寸邊界基底
                    if (parsed.floor.length > 0) {
                        parsed.floor.forEach(ent => ent.points.forEach(updateBounds));
                    }
                    
                    if ((minX === Infinity || maxX === -Infinity) && parsed.walls.length > 0) {
                        parsed.walls.forEach(ent => ent.points.forEach(updateBounds));
                    }

                    if ((minX === Infinity || maxX === -Infinity) && parsed.columns.length > 0) {
                        parsed.columns.forEach(ent => ent.points.forEach(updateBounds));
                    }

                    if (minX === Infinity || maxX === -Infinity) {
                        minX = 0; maxX = defaultW; minY = 0; maxY = defaultW * 0.7;
                    }

                    spaceWidth = maxX - minX;
                    spaceHeight = maxY - minY;

                    const normPt = (pt) => ({ x: pt.x - minX, y: pt.y - minY });

                    // 導入拼接模組，完美合併 LINE 與 ARC
                    floorPolygons = joinSegments(parsed.floor).map(poly => poly.map(normPt));
                    wallPolygons = joinSegments(parsed.walls).map(poly => poly.map(normPt));

                    if (floorPolygons.length === 0 && wallPolygons.length > 0) {
                        floorPolygons = wallPolygons;
                    }

                    barriers = parsed.columns.map(ent => {
                        const normPts = ent.points.map(normPt);
                        let cMinX = Infinity, cMaxX = -Infinity, cMinY = Infinity, cMaxY = -Infinity;
                        normPts.forEach(pt => {
                            if (pt.x < cMinX) cMinX = pt.x; if (pt.x > cMaxX) cMaxX = pt.x;
                            if (pt.y < cMinY) cMinY = pt.y; if (pt.y > cMaxY) cMaxY = pt.y;
                        });
                        const w = cMaxX - cMinX, h = cMaxY - cMinY;
                        return {
                            x: (cMinX + cMaxX) / 2,
                            y: (cMinY + cMaxY) / 2,
                            w: w > 0 ? w : 600,
                            h: h > 0 ? h : 600,
                            angle: 0,
                            type: 'pillar',
                            polygon: normPts
                        };
                    });

                    buildSystemState();
                    overlay.style.display = 'none';
                    showToast(`✅ DXF 空間向量解算與弧線段完美重組拼接！`);
                } catch (err) {
                    overlay.style.display = 'none';
                    showToast("⚠️ DXF 檔案結構解析失敗，將退回備用空間。");
                    spaceWidth = defaultW; spaceHeight = defaultW * 0.7; barriers = []; buildSystemState();
                }
            }, 300);
        }

        function loadFloorplanDXF(url, defaultW) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden'); overlay.style.display = 'flex';
            
            fetch(url)
                .then(r => { if(!r.ok) throw new Error(); return r.text(); })
                .then(txt => processDxfContent(txt, defaultW))
                .catch(() => {
                    overlay.style.display = 'none';
                    showToast("⚠️ 無法載入 GitHub 的 DXF 空間，已套用預設平面尺寸。");
                    spaceWidth = defaultW; spaceHeight = defaultW * 0.7; barriers = []; buildSystemState();
                });
        }

        // --- 4.5 🚀 智慧存檔與讀取模組 🚀 ---
        function saveLayoutFile() {
            const dataStr = JSON.stringify({
                spaceWidth,
                spaceHeight,
                currentPlanKey,
                floorPolygons,
                wallPolygons,
                barriers,
                objects
            }, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = `3D_Shelf_Layout_${Date.now()}.json`;
            link.href = url;
            link.click();
            URL.revokeObjectURL(url);
            showToast("💾 佈置檔案與所有貨架配置已成功導出儲存！");
        }

        function loadLayoutFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.spaceWidth && data.spaceHeight) {
                        spaceWidth = data.spaceWidth;
                        spaceHeight = data.spaceHeight;
                        currentPlanKey = data.currentPlanKey || 'Custom';
                        floorPolygons = data.floorPolygons || [];
                        wallPolygons = data.wallPolygons || [];
                        barriers = data.barriers || [];
                        objects = data.objects || [];
                        
                        buildSystemState(true); 
                        showToast("📂 佈局存檔載入成功，已完全恢復貨架與佈置配置！");
                    } else {
                        showToast("❌ 無效的佈局備份檔！");
                    }
                } catch (err) {
                    showToast("❌ 讀取佈建備份檔出錯！");
                }
            };
            reader.readAsText(file);
        }

        // 射線判定算法：精準計算點是否在封閉多邊形內部
        function isPointInPolygon(pt, polygon) {
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i].x, yi = polygon[i].y;
                const xj = polygon[j].x, yj = polygon[j].y;
                const intersect = ((yi > pt.y) !== (yj > pt.y))
                    && (pt.x < (xj - xi) * (pt.y - yi) / (yj - yi || 1) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        // --- 5. Geometry / Collision ---
        function checkOBBCollision(boxA, boxB) {
            const getVertices = (box) => {
                const halfW = box.length / 2, halfH = box.width / 2;
                const rad = (box.angle * Math.PI) / 180, cos = Math.cos(rad), sin = Math.sin(rad);
                return [
                    { x: -halfW, y: -halfH }, { x: halfW, y: -halfH },
                    { x: halfW, y: halfH }, { x: -halfW, y: halfH }
                ].map(v => ({ x: box.x + (v.x * cos - v.y * sin), y: box.y + (v.x * sin + v.y * cos) }));
            };
            const getAxes = (vertices) => {
                const axes = [];
                for (let i = 0; i < vertices.length; i++) {
                    const p1 = vertices[i], p2 = vertices[(i + 1) % vertices.length];
                    const edge = { x: p2.x - p1.x, y: p2.y - p1.y };
                    const normal = { x: -edge.y, y: edge.x };
                    const len = Math.sqrt(normal.x * normal.x + normal.y * normal.y);
                    axes.push({ x: normal.x / len, y: normal.y / len });
                }
                return axes;
            };
            const project = (vertices, axis) => {
                let min = Infinity, max = -Infinity;
                for (const v of vertices) {
                    const dot = v.x * axis.x + v.y * axis.y;
                    if (dot < min) min = dot;
                    if (dot > max) max = dot;
                }
                return { min, max };
            };
            const overlap = (p1, p2) => !(p1.max < p2.min || p2.max < p1.min);
            
            const vA = getVertices(boxA), vB = getVertices(boxB);
            const axes = [...getAxes(vA), ...getAxes(vB)];
            for (const axis of axes) {
                if (!overlap(project(vA, axis), project(vB, axis))) return false;
            }
            return true;
        }

        // 解決: 高精物理極限邊界控制，貨架 4 個角必須完全处于地面多邊形內部，徹底防範移出邊界
        function isPositionAllowed(targetObj, objectList, barrierList) {
            const halfW = targetObj.length / 2, halfH = targetObj.width / 2;
            const rad = (targetObj.angle * Math.PI) / 180;
            const cos = Math.cos(rad), sin = Math.sin(rad);
            
            const corners = [
                { x: -halfW, y: -halfH }, { x: halfW, y: -halfH },
                { x: halfW, y: halfH }, { x: -halfW, y: halfH }
            ].map(v => ({
                x: targetObj.x + (v.x * cos - v.y * sin),
                y: targetObj.y + (v.x * sin + v.y * cos)
            }));

            // 1. 多邊形極限邊緣圍牆校驗
            if (floorPolygons && floorPolygons.length > 0) {
                for (const corner of corners) {
                    let insideFloor = false;
                    for (const poly of floorPolygons) {
                        if (isPointInPolygon(corner, poly)) {
                            insideFloor = true;
                            break;
                        }
                    }
                    if (!insideFloor) return false; 
                }
            } else {
                // 傳統矩形邊界防護
                for (const corner of corners) {
                    if (corner.x < 0 || corner.x > spaceWidth || corner.y < 0 || corner.y > spaceHeight) {
                        return false;
                    }
                }
            }

            // 2. 貨架與貨架間的碰撞防護
            for (const other of objectList) {
                if (other.id !== targetObj.id && checkOBBCollision(targetObj, other)) return false;
            }
            
            // 3. 貨架與柱子間的碰撞防護
            for (const bar of barrierList) {
                if (checkOBBCollision(targetObj, { x: bar.x, y: bar.y, length: bar.w, width: bar.h, angle: (bar.angle * 180)/Math.PI })) return false;
            }
            return true;
        }

        // 靠牆與柱體自動磁吸附修正 - 貼合邊緣時自動留出 2mm 微縮冗餘防碰撞，杜絕被牆排斥在外的死鎖
        function getSnappedPosition(obj, tx, ty) {
            const SNAP_THRESHOLD = 150; // 150mm 吸附半徑
            const SAFE_MARGIN = 2; // 2mm 安全微縮，防止浮點數碰撞引擎誤判
            const rad = (obj.angle * Math.PI) / 180;
            const cos = Math.abs(Math.cos(rad)), sin = Math.abs(Math.sin(rad));
            const halfW = (obj.length * cos + obj.width * sin) / 2;
            const halfH = (obj.length * sin + obj.width * cos) / 2;

            let snappedX = tx;
            let snappedY = ty;

            // 1. 貼合外圍牆壁邊緣
            if (Math.abs(tx - halfW) < SNAP_THRESHOLD) {
                snappedX = halfW + SAFE_MARGIN;
            } else if (Math.abs(tx + halfW - spaceWidth) < SNAP_THRESHOLD) {
                snappedX = spaceWidth - halfW - SAFE_MARGIN;
            }

            if (Math.abs(ty - halfH) < SNAP_THRESHOLD) {
                snappedY = halfH + SAFE_MARGIN;
            } else if (Math.abs(ty + halfH - spaceHeight) < SNAP_THRESHOLD) {
                snappedY = spaceHeight - halfH - SAFE_MARGIN;
            }

            // 2. 貼合結構柱子邊緣
            barriers.forEach(bar => {
                const bLeft = bar.x - bar.w / 2;
                const bRight = bar.x + bar.w / 2;
                const bTop = bar.y - bar.h / 2;
                const bBottom = bar.y + bar.h / 2;

                if (ty + halfH > bTop && ty - halfH < bBottom) {
                    if (Math.abs((tx + halfW) - bLeft) < SNAP_THRESHOLD) {
                        snappedX = bLeft - halfW - SAFE_MARGIN;
                    } else if (Math.abs((tx - halfW) - bRight) < SNAP_THRESHOLD) {
                        snappedX = bRight + halfW + SAFE_MARGIN;
                    }
                }

                if (tx + halfW > bLeft && tx - halfW < bRight) {
                    if (Math.abs((ty + halfH) - bTop) < SNAP_THRESHOLD) {
                        snappedY = bTop - halfH - SAFE_MARGIN;
                    } else if (Math.abs((ty - halfH) - bBottom) < SNAP_THRESHOLD) {
                        snappedY = bBottom + halfH + SAFE_MARGIN;
                    }
                }
            });

            return { x: snappedX, y: snappedY };
        }

        // --- 6. 2D Canvas Drawing & Scale-Independent Coordinates ---
        function resizeCanvas() {
            const container = canvas.parentElement;
            if (container) {
                canvas.width = container.clientWidth || 500;
                canvas.height = container.clientHeight || 500;
            }
            resetCanvasView();
            drawFloorplan();
        }

        function resetCanvasView() {
            const wRatio = canvas.width / (spaceWidth / SCALE);
            const hRatio = canvas.height / (spaceHeight / SCALE);
            zoom = Math.min(wRatio, hRatio) * 0.65; 
            panX = (canvas.width - (spaceWidth / SCALE) * zoom) / 2;
            panY = (canvas.height - (spaceHeight / SCALE) * zoom) / 2 + 25; 
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.clientX ?? (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function canvasToWorld(e) {
            const m = getMousePos(e);
            return { x: ((m.x - panX) / zoom) * SCALE, y: ((m.y - panY) / zoom) * SCALE };
        }

        // ⭐ BUG 3 解決: 工業級 CAD 雙段中斷線標注引擎，數值永不與線重疊 ⭐
        function drawDimensionLine(ctxTarget, x1, y1, x2, y2, text, offset, isVert, isExport = false) {
            ctxTarget.save();
            ctxTarget.strokeStyle = ctxTarget.fillStyle = '#22c55e';
            const baseScale = isExport ? 2.5 : 1.75;
            ctxTarget.lineWidth = 2.0 * baseScale;
            
            const arrowSize = 6 * baseScale;
            const fontSize = Math.round(13 * baseScale);
            const dimOffset = offset * baseScale * 0.95;

            // 預先測量文字寬度以精確留白
            ctxTarget.font = `bold ${fontSize}px Arial`;
            const tWidth = ctxTarget.measureText(text).width;
            const textGap = tWidth + 12 * baseScale; // 為文字留出 12 像素安全間隔

            if (!isVert) {
                const ly = y1 + dimOffset;
                const midX = (x1 + x2) / 2;

                // 繪製垂直延伸輔助線
                ctxTarget.beginPath(); 
                ctxTarget.moveTo(x1, y1); 
                ctxTarget.lineTo(x1, ly + (dimOffset > 0 ? 8 * baseScale : -8 * baseScale)); 
                ctxTarget.moveTo(x2, y2); 
                ctxTarget.lineTo(x2, ly + (dimOffset > 0 ? 8 * baseScale : -8 * baseScale)); 
                ctxTarget.stroke();

                // 核心優化：如果標注線足夠長，中間斷開為兩段，防止穿過文字；過短則繪製單線
                ctxTarget.beginPath();
                if (Math.abs(x2 - x1) > textGap * 1.5) {
                    ctxTarget.moveTo(x1, ly);
                    ctxTarget.lineTo(midX - textGap / 2, ly);
                    ctxTarget.moveTo(midX + textGap / 2, ly);
                    ctxTarget.lineTo(x2, ly);
                } else {
                    ctxTarget.moveTo(x1, ly);
                    ctxTarget.lineTo(x2, ly);
                }
                ctxTarget.stroke();

                // 繪製左右兩端指向外的綠色精準箭頭
                ctxTarget.beginPath(); 
                ctxTarget.moveTo(x1, ly); 
                ctxTarget.lineTo(x1 + arrowSize * 2, ly - arrowSize); 
                ctxTarget.lineTo(x1 + arrowSize * 2, ly + arrowSize); 
                ctxTarget.fill();

                ctxTarget.beginPath(); 
                ctxTarget.moveTo(x2, ly); 
                ctxTarget.lineTo(x2 - arrowSize * 2, ly - arrowSize); 
                ctxTarget.lineTo(x2 - arrowSize * 2, ly + arrowSize); 
                ctxTarget.fill();
                
                // 完美定位繪製數值與完美融入背景的遮罩
                ctxTarget.textAlign = 'center'; 
                ctxTarget.textBaseline = 'middle';
                
                // 遮罩防護：使用與2D底圖一致的深藍色遮罩
                ctxTarget.fillStyle = '#0f172a';
                ctxTarget.fillRect(midX - tWidth/2 - 4 * baseScale, ly - fontSize/2 - 2 * baseScale, tWidth + 8 * baseScale, fontSize + 4 * baseScale);
                
                ctxTarget.fillStyle = '#22c55e';
                ctxTarget.fillText(text, midX, ly);

            } else {
                const lx = x1 + dimOffset;
                const midY = (y1 + y2) / 2;

                // 繪製水平延伸輔助線
                ctxTarget.beginPath(); 
                ctxTarget.moveTo(x1, y1); 
                ctxTarget.lineTo(lx + (dimOffset > 0 ? 8 * baseScale : -8 * baseScale), y1); 
                ctxTarget.moveTo(x2, y2); 
                ctxTarget.lineTo(lx + (dimOffset > 0 ? 8 * baseScale : -8 * baseScale), y2); 
                ctxTarget.stroke();

                // 核心優化：垂直尺寸標注線中斷設計
                ctxTarget.beginPath();
                if (Math.abs(y2 - y1) > textGap * 1.5) {
                    ctxTarget.moveTo(lx, y1);
                    ctxTarget.lineTo(lx, midY - textGap / 2);
                    ctxTarget.moveTo(lx, midY + textGap / 2);
                    ctxTarget.lineTo(lx, y2);
                } else {
                    ctxTarget.moveTo(lx, y1);
                    ctxTarget.lineTo(lx, y2);
                }
                ctxTarget.stroke();

                // 繪製上下兩端指向外的綠色精準箭頭
                ctxTarget.beginPath(); 
                ctxTarget.moveTo(lx, y1); 
                ctxTarget.lineTo(lx - arrowSize, y1 + arrowSize * 2); 
                ctxTarget.lineTo(lx + arrowSize, y1 + arrowSize * 2); 
                ctxTarget.fill();

                ctxTarget.beginPath(); 
                ctxTarget.moveTo(lx, y2); 
                ctxTarget.lineTo(lx - arrowSize, y2 - arrowSize * 2); 
                ctxTarget.lineTo(lx + arrowSize, y2 - arrowSize * 2); 
                ctxTarget.fill();

                // 旋轉 90 度垂直繪製文字
                ctxTarget.save(); 
                ctxTarget.translate(lx, midY); 
                ctxTarget.rotate(Math.PI / 2); 
                ctxTarget.textAlign = 'center'; 
                ctxTarget.textBaseline = 'middle';
                
                // 遮罩防護
                ctxTarget.fillStyle = '#0f172a';
                ctxTarget.fillRect(-tWidth/2 - 4 * baseScale, -fontSize/2 - 2 * baseScale, tWidth + 8 * baseScale, fontSize + 4 * baseScale);
                
                ctxTarget.fillStyle = '#22c55e';
                ctxTarget.fillText(text, 0, 0);
                ctxTarget.restore();
            }
            ctxTarget.restore();
        }

        function drawAll2DObjects(ctxTarget, scaleDivider, isExport) {
            // 繪製柱子
            barriers.forEach(bar => {
                if (bar.type === 'pillar') {
                    ctxTarget.save();
                    ctxTarget.fillStyle = '#000000';
                    ctxTarget.strokeStyle = '#404040';
                    ctxTarget.lineWidth = isExport ? 3 : 1.5;

                    if (bar.polygon && bar.polygon.length > 2) {
                        ctxTarget.beginPath();
                        ctxTarget.moveTo(bar.polygon[0].x / scaleDivider, bar.polygon[0].y / scaleDivider);
                        for (let p = 1; p < bar.polygon.length; p++) {
                            ctxTarget.lineTo(bar.polygon[p].x / scaleDivider, bar.polygon[p].y / scaleDivider);
                        }
                        ctxTarget.closePath();
                        ctxTarget.fill();
                        ctxTarget.stroke();
                    } else {
                        ctxTarget.translate(bar.x / scaleDivider, bar.y / scaleDivider);
                        ctxTarget.fillRect(-bar.w / 2 / scaleDivider, -bar.h / 2 / scaleDivider, bar.w / scaleDivider, bar.h / scaleDivider);
                        ctxTarget.strokeRect(-bar.w / 2 / scaleDivider, -bar.h / 2 / scaleDivider, bar.w / scaleDivider, bar.h / scaleDivider);
                    }
                    ctxTarget.restore();
                }
            });

            // 繪製物件
            objects.forEach(obj => {
                const isSel = (!isExport && obj.id === selectedId);
                const strokeWidth = isSel ? 4 : (isExport ? 3 : 1.5);
                
                ctxTarget.save(); 
                ctxTarget.translate(obj.x / scaleDivider, obj.y / scaleDivider); 
                ctxTarget.rotate((obj.angle * Math.PI) / 180);
                
                ctxTarget.fillStyle = isSel ? '#4f46e5' : obj.color; 
                ctxTarget.fillRect(-obj.length / 2 / scaleDivider, -obj.width / 2 / scaleDivider, obj.length / scaleDivider, obj.width / scaleDivider);
                
                ctxTarget.strokeStyle = isSel ? '#818cf8' : '#64748b'; 
                ctxTarget.lineWidth = strokeWidth;
                const innerW = obj.length / scaleDivider - strokeWidth / scaleDivider;
                const innerH = obj.width / scaleDivider - strokeWidth / scaleDivider;
                ctxTarget.strokeRect(-innerW / 2, -innerH / 2, innerW, innerH);
                
                ctxTarget.strokeStyle = '#e2e8f0'; 
                ctxTarget.lineWidth = isExport ? 5 : 3; 
                ctxTarget.beginPath(); 
                ctxTarget.moveTo(-obj.length / 2 / scaleDivider + 10, -obj.width / 2 / scaleDivider); 
                ctxTarget.lineTo(obj.length / 2 / scaleDivider - 10, -obj.width / 2 / scaleDivider); 
                ctxTarget.stroke();
                ctxTarget.restore();

                ctxTarget.save(); ctxTarget.translate(obj.x / scaleDivider, obj.y / scaleDivider);
                ctxTarget.rotate((obj.angle * Math.PI) / 180);
                
     // 不顯示牆身的標籤和尺寸
                if (obj.type !== 'wall') {
                    // 繪製物件說明文字（在名稱上方）
                    if (obj.description && obj.description.trim()) {
                        ctxTarget.font = `700 ${isExport ? 17 : 17}px "Microsoft JhengHei"`;
                        const descW = ctxTarget.measureText(obj.description).width;

                        ctxTarget.fillStyle = '#f2c41b';
                        ctxTarget.textAlign = 'center';
                        ctxTarget.textBaseline = 'middle';
                        ctxTarget.fillText(obj.description, 0, -(isExport?20:20));
                    }
                    
                    ctxTarget.font = `500 ${isExport ? 16 : 16}px "Microsoft JhengHei"`; 
                    const displayString = obj.name;
                    const txtW = ctxTarget.measureText(displayString).width;
                    
                    // 限制標籤在物件範圍內
                    const maxLabelWidth = obj.length / scaleDivider - (isExport?20:20);
                    const labelWidth = Math.min(txtW + (isExport?18:18), maxLabelWidth);
                    const labelX = -labelWidth/2;
                    const labelY = -(isExport?12:12);
                    
                    ctxTarget.fillStyle = '#f8fafc'; 
                    ctxTarget.textAlign = 'center'; 
                    ctxTarget.textBaseline = 'middle'; 
                    ctxTarget.fillText(displayString, 0, 0);
                    ctxTarget.fillStyle = '#94a3b8'; 
                    ctxTarget.font = `${isExport ? 10 : 10}px Arial`; 
                    ctxTarget.fillText(`${obj.length}x${obj.width}x${obj.height}mm`, 0, isExport ? 24 : 24);
                } 
                ctxTarget.restore();
            });
        }

        // ⭐ 修改項目 2: 經下載圖紙中的增添貨架統計清單文字、標題全部放大 1.6 倍，並加寬行高及位置 ⭐
